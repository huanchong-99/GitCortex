services:
  server:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.server
      args:
        SOLODAWN_BUILD_NETWORK_PROFILE: ${SOLODAWN_BUILD_NETWORK_PROFILE:-official}
        BUILDKIT_INLINE_CACHE: "1"
    ports:
      - "${SOLODAWN_PORT:-23456}:23456"
    environment:
      SOLODAWN_RUNNER_MODE: remote
      SOLODAWN_RUNNER_ADDR: http://runner:50051
      SOLODAWN_MESSAGE_BUS: redis
      SOLODAWN_REDIS_URL: redis://redis:6379
      SOLODAWN_ENCRYPTION_KEY: ${SOLODAWN_ENCRYPTION_KEY}
      SOLODAWN_API_TOKEN: ${SOLODAWN_API_TOKEN:-}
      SOLODAWN_CORS_ORIGINS: ${SOLODAWN_CORS_ORIGINS:-}
    volumes:
      - solodawn-data:/var/lib/solodawn
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:23456/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  runner:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.runner
      args:
        SOLODAWN_BUILD_NETWORK_PROFILE: ${SOLODAWN_BUILD_NETWORK_PROFILE:-official}
        BUILDKIT_INLINE_CACHE: "1"
    environment:
      SOLODAWN_RUNNER_ADDR: "0.0.0.0:50051"
      SOLODAWN_MESSAGE_BUS: redis
      SOLODAWN_REDIS_URL: redis://redis:6379
    volumes:
      - ${HOST_WORKSPACE_ROOT:-./workspace}:${SOLODAWN_WORKSPACE_ROOT:-/workspace}
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

volumes:
  solodawn-data:
  redis-data:
